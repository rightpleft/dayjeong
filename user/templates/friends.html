<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>친구</title>

<style>
body {
    font-family: Arial;
    background:#f5f6fa;
    margin:0;
    padding:20px;
}

.container {
    max-width:500px;
    margin:auto;
}

/* 제목 */
h2 {
    margin-bottom:20px;
}

/* 검색창 */
.search-box {
    display:flex;
    margin-bottom:20px;
}

.search-box input {
    flex:1;
    padding:10px;
    border:1px solid #ddd;
    border-radius:5px 0 0 5px;
}

.search-box button {
    padding:10px 15px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:0 5px 5px 0;
    cursor:pointer;
}

/* 친구 카드 */
.friend-card {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 이름 */
.friend-name {
    font-weight:bold;
}

/* 버튼 영역 */
.actions a {
    margin-left:8px;
    text-decoration:none;
    font-size:12px;
    padding:5px 8px;
    border-radius:5px;
}

/* 버튼 스타일 */
.view { background:#2196F3; color:white; }
.delete { background:#999; color:white; }
.block { background:#f44336; color:white; }

.actions a:hover {
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h2>👥 친구</h2>

<form method="POST" action="/send-request/">
    {% csrf_token %}
    <input type="text" name="username" placeholder="아이디 검색">
    <button type="submit">요청</button>
</form>

<a href="/requests/">📨 친구 요청 보기</a>

<hr>

{% for f in friends %}
    <div>
        {{ f.to_user.username }}
    </div>
{% empty %}
    <p>친구 없음</p>
{% endfor %}

</div>

</body>
</html>
