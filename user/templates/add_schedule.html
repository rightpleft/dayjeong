<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 관리</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }

.calendar {
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:5px;
    margin-bottom:20px;
}

.day {
    padding:10px;
    text-align:center;
    border-radius:5px;
    background:#eee;
    cursor:pointer;
}

.확정 { background:#4CAF50; color:white; }
.겹침 { background:#f44336; color:white; }
.미확정 { background:orange; color:white; }

.schedule-item {
    padding:10px;
    background:white;
    margin-top:5px;
}
</style>
</head>

<body>

<h2>📅 일정 관리</h2>

<div id="calendar" class="calendar"></div>

<h3 id="date">날짜 선택</h3>

<input type="text" id="title" placeholder="일정">
<select id="status">
    <option value="확정">확정</option>
    <option value="미확정">미확정</option>
</select>

<button onclick="add()">추가</button>

<div id="list"></div>

<script>
let selected=null;
const now=new Date();
const y=now.getFullYear();
const m=now.getMonth();

function key(){ return `cal-${y}-${m}`; }

function loadCal(){
    const cal=document.getElementById("calendar");
    cal.innerHTML="";

    const saved=JSON.parse(localStorage.getItem(key()))||{};
    const last=new Date(y,m+1,0).getDate();

    for(let d=1;d<=last;d++){
        const div=document.createElement("div");
        div.className="day";
        div.innerText=d;

        if(saved[d]){
            if(saved[d].length>1) div.classList.add("겹침");
            else div.classList.add(saved[d][0].status);
        }

        div.onclick=()=>select(d);
        cal.appendChild(div);
    }
}

function select(d){
    selected=d;
    document.getElementById("date").innerText=`${m+1}/${d}`;
    loadList();
}

function loadList(){
    const saved=JSON.parse(localStorage.getItem(key()))||{};
    const list=document.getElementById("list");
    list.innerHTML="";

    if(saved[selected]){
        saved[selected].forEach((s,i)=>{
            const div=document.createElement("div");
            div.className="schedule-item";
            div.innerHTML=`${s.title} (${s.status})
            <button onclick="del(${i})">삭제</button>`;
            list.appendChild(div);
        });
    }
}

function add(){
    const title=document.getElementById("title").value;
    const status=document.getElementById("status").value;

    if(!selected||!title){ alert("입력해"); return; }

    const saved=JSON.parse(localStorage.getItem(key()))||{};
    if(!saved[selected]) saved[selected]=[];

    saved[selected].push({title,status});

    localStorage.setItem(key(),JSON.stringify(saved));

    loadCal();
    loadList();
}

function del(i){
    const saved=JSON.parse(localStorage.getItem(key()))||{};
    saved[selected].splice(i,1);

    if(saved[selected].length===0) delete saved[selected];

    localStorage.setItem(key(),JSON.stringify(saved));

    loadCal();
    loadList();
}

loadCal();
</script>

</body>
</html>
