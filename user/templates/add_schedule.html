<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 관리</title>

<style>
body {
    font-family: Arial;
    padding:20px;
    background:#f5f6fa;
}

/* 상단 */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

/* 요일 + 캘린더 공통 */
.calendar {
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:5px;
}

/* 요일 */
.weekday {
    text-align:center;
    font-weight:bold;
}

/* 날짜 */
.day {
    padding:10px;
    text-align:center;
    border-radius:5px;
    background:#eee;
    cursor:pointer;
}

/* 상태 색 */
.확정 { background:#4CAF50; color:white; }
.겹침 { background:#f44336; color:white; }
.미확정 { background:orange; color:white; }

/* 상태 설명 */
.legend {
    margin-top:15px;
    font-size:14px;
}

/* 리스트 */
.schedule-item {
    padding:10px;
    background:white;
    margin-top:5px;
}

/* 하단 네비 */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left:0;
    width: 100%;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}
</style>
</head>

<body>

<h2>📅 일정 관리</h2>

<!-- 월 이동 -->
<div class="header">
    <button onclick="prevMonth()">◀</button>
    <h3 id="month"></h3>
    <button onclick="nextMonth()">▶</button>
</div>

<!-- 요일 -->
<div class="calendar">
    <div class="weekday">월</div>
    <div class="weekday">화</div>
    <div class="weekday">수</div>
    <div class="weekday">목</div>
    <div class="weekday">금</div>
    <div class="weekday">토</div>
    <div class="weekday">일</div>
</div>

<!-- 캘린더 -->
<div id="calendar" class="calendar"></div>

<!-- 상태 설명 -->
<div class="legend">
    <span style="color:#4CAF50;">● 확정</span>
    <span style="color:orange;">● 미확정</span>
    <span style="color:#f44336;">● 겹침</span>
</div>

<h3 id="date">날짜 선택</h3>

<input type="text" id="title" placeholder="일정">
<select id="status">
    <option value="확정">확정</option>
    <option value="미확정">미확정</option>
</select>

<button onclick="add()">추가</button>

<div id="list"></div>

<!-- 하단 네비 -->
<div class="bottom-nav">
    <a href="/">🏠 홈</a>
    <a href="/add/">📅 일정</a>
    <a href="/friends/">👥 친구</a>
    <a href="/settings/">⚙ 설정</a>
</div>

<script>
let selected = null;

/* ⭐ 핵심: 항상 1일 기준 */
let now = new Date();
now.setDate(1);
const username = "{{ username }}"

function key(){
    return `cal-${now.getFullYear()}-${now.getMonth()}`;
}

function loadCal(){
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    const year = now.getFullYear();
    const month = now.getMonth();

    document.getElementById("month").innerText =
        `${year}년 ${month+1}월`;

    const saved = JSON.parse(localStorage.getItem(key())) || {};

    const firstDay = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();

    // ⭐ 시작 요일 맞추기 (월요일 시작)
    let start = firstDay === 0 ? 6 : firstDay - 1;

    for(let i = 0; i < start; i++){
        const empty = document.createElement("div");
        cal.appendChild(empty);
    }

    // ⭐ 전체 날짜 생성 (절대 today 쓰지 않음)
    for(let d = 1; d <= lastDay; d++){
        const div = document.createElement("div");
        div.className = "day";
        div.innerText = d;

        if(saved[d]){
            if(saved[d].length > 1){
                div.classList.add("겹침");
            } else {
                div.classList.add(saved[d][0].status);
            }
        }

        div.onclick = () => select(d);
        cal.appendChild(div);
    }
}

function prevMonth(){
    now.setMonth(now.getMonth() - 1);
    now.setDate(1);
    loadCal();
}

function nextMonth(){
    now.setMonth(now.getMonth() + 1);
    now.setDate(1);
    loadCal();
}

function select(d){
    selected = d;
    document.getElementById("date").innerText =
        `${now.getMonth()+1}/${d}`;
    loadList();
}

function loadList(){
    const saved = JSON.parse(localStorage.getItem(key())) || {};
    const list = document.getElementById("list");
    list.innerHTML = "";

    if(saved[selected]){
        saved[selected].forEach((s,i)=>{
            const div = document.createElement("div");
            div.className = "schedule-item";
            div.innerHTML = `
                ${s.title} (${s.status})
                <button onclick="del(${i})">삭제</button>
            `;
            list.appendChild(div);
        });
    }
}

function add(){
    const title = document.getElementById("title").value;
    const status = document.getElementById("status").value;

    if(!selected || !title){
        alert("입력해!");
        return;
    }

    const saved = JSON.parse(localStorage.getItem(key())) || {};

    if(!saved[selected]){
        saved[selected] = [];
    }

    saved[selected].push({title, status});

    localStorage.setItem(key(), JSON.stringify(saved));

    document.getElementById("title").value = "";

    loadCal();
    loadList();
}

function del(i){
    const saved = JSON.parse(localStorage.getItem(key())) || {};

    saved[selected].splice(i,1);

    if(saved[selected].length === 0){
        delete saved[selected];
    }

    localStorage.setItem(key(), JSON.stringify(saved));

    loadCal();
    loadList();
}

loadCal();
</script>

</body>
</html>
