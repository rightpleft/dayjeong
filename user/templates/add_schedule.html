<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 캘린더</title>

<style>
body { font-family: Arial; background:#f5f6fa; }

.container {
    width:700px; margin:50px auto;
    background:white; padding:20px;
    border-radius:10px;
}

.top-bar {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.month-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.fill { background:#4CAF50; color:white; }
.clear { background:#f44336; color:white; }
.nav { background:#ddd; }

.calendar {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day {
    height:80px;
    border:1px solid #ddd;
    text-align:center;
    padding-top:10px;
    cursor:pointer;
    border-radius:5px;
    background:#eee;
}

.day-name { text-align:center; font-weight:bold; }

/* 상태 색깔 */
.확정 { background:#4CAF50; color:white; }
.겹침 { background:#f44336; color:white; }
.미확정 { background:orange; color:white; }

/* 설명 */
.legend { margin-bottom:10px; }
.box {
    display:inline-block;
    width:12px; height:12px;
    margin:0 5px;
}
</style>
</head>

<body>

<div class="container">

<!-- 상단 버튼 -->
<div class="top-bar">
    <button class="fill" onclick="fillAll()">전체 채우기</button>
    <button class="clear" onclick="clearAll()">전체 비우기</button>
</div>

<!-- 상태 설명 -->
<div class="legend">
    <span class="box 확정"></span> 확정
    <span class="box 겹침"></span> 겹침
    <span class="box 미확정"></span> 미확정
    <span class="box" style="background:#ccc"></span> 없음
</div>

<!-- 월 이동 -->
<div class="month-bar">
    <button class="nav" onclick="prevMonth()">◀</button>
    <div id="month"></div>
    <button class="nav" onclick="nextMonth()">▶</button>
</div>

<!-- 캘린더 -->
<div class="calendar" id="calendar"></div>

</div>

<!-- 🔥 모달 -->
<div id="modal" style="display:none; position:fixed; top:30%; left:50%;
transform:translate(-50%,-50%);
background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);">

<h3 id="selected-date"></h3>

<input id="schedule-input" placeholder="일정 입력" style="width:100%;">

<br><br>

<button onclick="toggleStatus()">상태표시</button>

<div id="status-options" style="display:none;">
    <button onclick="setStatus('확정')">확정</button>
    <button onclick="setStatus('겹침')">겹침</button>
    <button onclick="setStatus('미확정')">미확정</button>
</div>

<br><br>

<button onclick="saveSchedule()">저장</button>
<button onclick="closeModal()">닫기</button>

</div>

<script>
let currentDate = new Date();
let selectedDay = null;
let selectedStatus = null;

/* 저장 키 */
function getKey(y,m){ return `cal-${y}-${m}` }

function saveState(y,m,data){
    localStorage.setItem(getKey(y,m), JSON.stringify(data));
}

function loadState(y,m){
    return JSON.parse(localStorage.getItem(getKey(y,m))) || {};
}

/* 캘린더 렌더 */
function renderCalendar(){
    const cal = document.getElementById("calendar");
    const monthText = document.getElementById("month");

    cal.innerHTML = "";

    const y = currentDate.getFullYear();
    const m = currentDate.getMonth();

    monthText.innerText = `${y}년 ${m+1}월`;

    const first = new Date(y,m,1).getDay();
    const last = new Date(y,m+1,0).getDate();

    const days = ["일","월","화","수","목","금","토"];

    // 요일
    days.forEach(d=>{
        let el=document.createElement("div");
        el.className="day-name";
        el.innerText=d;
        cal.appendChild(el);
    });

    // 빈칸
    for(let i=0;i<first;i++){
        cal.appendChild(document.createElement("div"));
    }

    const saved = loadState(y,m);

    // 날짜
    for(let i=1;i<=last;i++){
        let d=document.createElement("div");
        d.className="day";
        d.innerText=i;

        if(saved[i]){
            d.classList.add(saved[i]);
        }

        d.onclick=()=>{
            openModal(d, `${y}-${m+1}-${i}`);
        };

        cal.appendChild(d);
    }
}

/* 모달 */
function openModal(day,date){
    selectedDay = day;
    selectedStatus = null;
    document.getElementById("modal").style.display="block";
    document.getElementById("selected-date").innerText=date;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* 상태 선택 */
function toggleStatus(){
    let box=document.getElementById("status-options");
    box.style.display = box.style.display==="none"?"block":"none";
}

function setStatus(s){
    selectedStatus=s;
}

/* 저장 */
function saveSchedule(){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();

    let saved=loadState(y,m);

    selectedDay.classList.remove("확정","겹침","미확정");

    if(selectedStatus){
        selectedDay.classList.add(selectedStatus);
        saved[selectedDay.innerText]=selectedStatus;
    }

    saveState(y,m,saved);
    closeModal();
}

/* 전체 채우기 */
function fillAll(){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const last=new Date(y,m+1,0).getDate();

    let data={};
    for(let i=1;i<=last;i++){
        data[i]="확정";
    }

    saveState(y,m,data);
    renderCalendar();
}

/* 전체 비우기 */
function clearAll(){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    localStorage.removeItem(getKey(y,m));
    renderCalendar();
}

/* 월 이동 */
function prevMonth(){
    currentDate.setMonth(currentDate.getMonth()-1);
    renderCalendar();
}

function nextMonth(){
    currentDate.setMonth(currentDate.getMonth()+1);
    renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
