<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 관리</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }

/* 상단 월 이동 */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

/* 캘린더 */
.calendar {
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:5px;
    margin-bottom:20px;
}

.day {
    padding:10px;
    text-align:center;
    border-radius:5px;
    background:#eee;
    cursor:pointer;
}

/* 상태 색 */
.확정 { background:#4CAF50; color:white; }
.겹침 { background:#f44336; color:white; }
.미확정 { background:orange; color:white; }

/* 상태 설명 */
.legend {
    margin-bottom:15px;
    font-size:14px;
}

.legend span {
    margin-right:10px;
}

/* 리스트 */
.schedule-item {
    padding:10px;
    background:white;
    margin-top:5px;
}

/* 하단 네비 */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left:0;
    width: 100%;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}
</style>
</head>

<body>

<h2>📅 일정 관리</h2>

<!-- 월 이동 -->
<div class="header">
    <button onclick="prevMonth()">◀</button>
    <h3 id="month"></h3>
    <button onclick="nextMonth()">▶</button>
</div>

<!-- 상태 설명 -->
<div class="legend">
    <span style="color:#4CAF50;">● 확정</span>
    <span style="color:orange;">● 미확정</span>
    <span style="color:#f44336;">● 겹침</span>
</div>

<!-- 캘린더 -->
<div id="calendar" class="calendar"></div>

<h3 id="date">날짜 선택</h3>

<input type="text" id="title" placeholder="일정">
<select id="status">
    <option value="확정">확정</option>
    <option value="미확정">미확정</option>
</select>

<button onclick="add()">추가</button>

<div id="list"></div>

<!-- 하단 네비 -->
<div class="bottom-nav">
    <a href="/">🏠 홈</a>
    <a href="/add/">📅 일정</a>
    <a href="/friends/">👥 친구</a>
    <a href="/settings/">⚙ 설정</a>
</div>

<script>
let selected=null;
let now=new Date();

function key(){
    return `cal-${now.getFullYear()}-${now.getMonth()}`;
}

function loadCal(){
    const cal=document.getElementById("calendar");
    cal.innerHTML="";

    document.getElementById("month").innerText =
        `${now.getFullYear()}년 ${now.getMonth()+1}월`;

    const saved=JSON.parse(localStorage.getItem(key()))||{};
    const last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

    for(let d=1; d<=last; d++){
        const div=document.createElement("div");
        div.className="day";
        div.innerText=d;

        if(saved[d]){
            if(saved[d].length>1) div.classList.add("겹침");
            else div.classList.add(saved[d][0].status);
        }

        div.onclick=()=>select(d);
        cal.appendChild(div);
    }
}

function prevMonth(){
    now.setMonth(now.getMonth()-1);
    loadCal();
}

function nextMonth(){
    now.setMonth(now.getMonth()+1);
    loadCal();
}

function select(d){
    selected=d;
    document.getElementById("date").innerText =
        `${now.getMonth()+1}/${d}`;
    loadList();
}

function loadList(){
    const saved=JSON.parse(localStorage.getItem(key()))||{};
    const list=document.getElementById("list");
    list.innerHTML="";

    if(saved[selected]){
        saved[selected].forEach((s,i)=>{
            const div=document.createElement("div");
            div.className="schedule-item";
            div.innerHTML=`${s.title} (${s.status})
            <button onclick="del(${i})">삭제</button>`;
            list.appendChild(div);
        });
    }
}

function add(){
    const title=document.getElementById("title").value;
    const status=document.getElementById("status").value;

    if(!selected||!title){ alert("입력해"); return; }

    const saved=JSON.parse(localStorage.getItem(key()))||{};
    if(!saved[selected]) saved[selected]=[];

    saved[selected].push({title,status});

    localStorage.setItem(key(),JSON.stringify(saved));

    loadCal();
    loadList();
}

function del(i){
    const saved=JSON.parse(localStorage.getItem(key()))||{};
    saved[selected].splice(i,1);

    if(saved[selected].length===0) delete saved[selected];

    localStorage.setItem(key(),JSON.stringify(saved));

    loadCal();
    loadList();
}

loadCal();
</script>

</body>
</html>
