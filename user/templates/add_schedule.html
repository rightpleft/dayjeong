<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 캘린더</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f6fa;
    }

    .container {
        width: 700px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .month-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .fill { background: #4CAF50; color: white; }
    .clear { background: #f44336; color: white; }
    .nav { background: #ddd; }

    .month {
        font-size: 20px;
        font-weight: bold;
    }

    .calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
    }

    .day-name {
        font-weight: bold;
        text-align: center;
    }

    .day {
        height: 80px;
        border: 1px solid #ddd;
        text-align: center;
        padding-top: 10px;
        cursor: pointer;
        border-radius: 5px;
        background: #eee; /* 기본: 일정없음 (회색) */
    }

    .확정 { background: #4CAF50; color: white; }
    .겹침 { background: #f44336; color: white; }
    .미확정 { background: orange; color: white; }
</style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <button class="fill" onclick="fillAll()">전체 채우기</button>
        <button class="clear" onclick="clearAll()">전체 비우기</button>
    </div>

    <div class="month-bar">
        <button class="nav" onclick="prevMonth()">◀</button>
        <div class="month" id="month"></div>
        <button class="nav" onclick="nextMonth()">▶</button>
    </div>

    <div class="calendar" id="calendar"></div>

</div>

<script>
    let currentDate = new Date();

    function getKey(year, month) {
        return `calendar-${year}-${month}`;
    }

    function saveState(year, month, data) {
        localStorage.setItem(getKey(year, month), JSON.stringify(data));
    }

    function loadState(year, month) {
        return JSON.parse(localStorage.getItem(getKey(year, month))) || {};
    }

    function renderCalendar() {
        const calendar = document.getElementById("calendar");
        const monthText = document.getElementById("month");

        calendar.innerHTML = "";

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        monthText.innerText = `${year}년 ${month + 1}월`;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        const daysOfWeek = ["일","월","화","수","목","금","토"];

        const saved = loadState(year, month);

        // 요일
        daysOfWeek.forEach(d => {
            let el = document.createElement("div");
            el.classList.add("day-name");
            el.innerText = d;
            calendar.appendChild(el);
        });

        // 빈칸
        for (let i = 0; i < firstDay; i++) {
            calendar.appendChild(document.createElement("div"));
        }

        // 날짜
        for (let i = 1; i <= lastDate; i++) {
            let day = document.createElement("div");
            day.classList.add("day");
            day.innerText = i;

            // 저장된 상태 적용
            if (saved[i]) {
                day.classList.add(saved[i]);
            }

            // 클릭 시 상태 변경 (회색 → 미확정 → 확정 → 겹침 → 반복)
            day.onclick = () => {
                day.classList.remove("확정","겹침","미확정");

                let current = saved[i];

                let next;
                if (!current) next = "미확정";
                else if (current === "미확정") next = "확정";
                else if (current === "확정") next = "겹침";
                else next = null;

                if (next) {
                    day.classList.add(next);
                    saved[i] = next;
                } else {
                    delete saved[i];
                }

                saveState(year, month, saved);
            };

            calendar.appendChild(day);
        }
    }

    function prevMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    }

    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    }

    function fillAll() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const lastDate = new Date(year, month + 1, 0).getDate();

        let data = {};
        for (let i = 1; i <= lastDate; i++) {
            data[i] = "확정";
        }

        saveState(year, month, data);
        renderCalendar();
    }

    function clearAll() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        localStorage.removeItem(getKey(year, month));
        renderCalendar();
    }

    renderCalendar();
</script>

</body>
</html>
