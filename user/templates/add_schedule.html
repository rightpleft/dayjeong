<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 추가</title>

<style>
body {
    font-family: Arial;
    background:#f5f6fa;
    margin:0;
}

.container {
    width:700px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    padding-bottom:80px;
}

h2 {
    margin-bottom:15px;
}

input, select, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    background:#4CAF50;
    color:white;
    border:none;
}

/* 상태 설명 */
.status-info {
    margin-top:15px;
    font-size:14px;
}

.status-info span {
    margin-right:10px;
}

.green { color:#4CAF50; }
.red { color:#f44336; }
.orange { color:orange; }
.gray { color:#999; }

/* 하단 네비 */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.bottom-nav a {
    text-decoration: none;
    color: #333;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 일정 추가</h2>

<input type="date" id="date">
<input type="text" id="title" placeholder="일정 내용 입력">

<select id="status">
    <option value="확정">확정</option>
    <option value="겹침">겹침</option>
    <option value="미확정">미확정</option>
</select>

<button onclick="saveSchedule()">저장</button>

<!-- 상태 설명 -->
<div class="status-info">
    <span class="green">● 확정</span>
    <span class="red">● 겹침</span>
    <span class="orange">● 미확정</span>
    <span class="gray">● 일정없음</span>
</div>

</div>

<!-- 하단바 -->
<div class="bottom-nav">
    <a href="/">🏠 홈</a>
    <a href="/add/">📅 일정</a>
    <a href="/friends/">👥 친구</a>
    <a href="/settings/">⚙ 설정</a>
</div>

<script>
function saveSchedule(){
    const dateInput = document.getElementById("date").value;
    const title = document.getElementById("title").value;
    const status = document.getElementById("status").value;

    if(!dateInput || !title){
        alert("날짜랑 내용 입력해!");
        return;
    }

    const date = new Date(dateInput);
    const y = date.getFullYear();
    const m = date.getMonth();
    const d = date.getDate();

    const key = `cal-${y}-${m}`;
    const saved = JSON.parse(localStorage.getItem(key)) || {};

    saved[d] = {
        title: title,
        status: status
    };

    localStorage.setItem(key, JSON.stringify(saved));

    alert("저장 완료!");
    location.href = "/";
}
</script>

</body>
</html>
