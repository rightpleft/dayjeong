<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f0f0f0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper {
    text-align:center;
}

.logo {
    font-size:44px;
    font-weight:bold;
    color:#222;
    margin-bottom:25px;
    letter-spacing:2px;
}

.sub {
    font-size:12px;
    color:#777;
    margin-top:5px;
}

.signup-box {
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    margin-bottom:20px;
    color:#333;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    box-sizing:border-box;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover {
    background:#111;
}

.link {
    margin-top:15px;
    font-size:13px;
    color:#555;
}

.error {
    color:red;
    font-size:13px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="logo">
        📅🌿 DayJeong
        <div class="sub">우리의 일정, 우리의 데이정</div>
    </div>

    <div class="signup-box">
        <h2>회원가입</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <input type="password" name="password2" placeholder="비밀번호 확인" required>
            <button type="submit">회원가입</button>
        </form>

        <div class="link">
            이미 계정이 있나요? <a href="/login/">로그인</a>
        </div>
    </div>

</div>

</body>
</html>
