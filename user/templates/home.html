<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>홈</title>

<style>
body {
    font-family: Arial;
    background:#f5f6fa;
    margin:0;
}

.container {
    width:700px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    padding-bottom:80px;
}

h2 {
    margin-bottom:10px;
}

/* 일정 */
.schedule-box {
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    color:white;
}

/* 상태 색 */
.확정 { background:#4CAF50; }
.겹침 { background:#f44336; }
.미확정 { background:orange; }
.없음 { background:#ccc; color:black; }

/* 연락 버튼 */
.contact-buttons {
    margin-top:20px;
    display:flex;
    gap:10px;
}

.contact-buttons a {
    flex:1;
    text-align:center;
    padding:10px;
    background:#f1f3f5;
    border-radius:8px;
    text-decoration:none;
    color:#333;
}

.contact-buttons a:hover {
    background:#ddd;
}

/* 하단 네비 */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.bottom-nav a {
    text-decoration: none;
    color: #333;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 오늘의 일정</h2>
<div id="today-schedule"></div>

<!-- 연락망 (일정 아래) -->
<div class="contact-buttons">
    <a href="mailto:example@email.com">📧 메일</a>
    <a href="https://instagram.com/dayjeong" target="_blank">📸 인스타</a>
    <a href="https://open.kakao.com/" target="_blank">💬 카톡</a>
</div>

</div>

<!-- 하단 네비 -->
<div class="bottom-nav">
    <a href="/">🏠 홈</a>
    <a href="/add/">📅 일정</a>
    <a href="/friends/">👥 친구</a>
    <a href="/settings/">⚙ 설정</a>
</div>

<script>
function loadTodaySchedule(){
    const today = new Date();
    const y = today.getFullYear();
    const m = today.getMonth();
    const d = today.getDate();

    const key = `cal-${y}-${m}`;
    const saved = JSON.parse(localStorage.getItem(key)) || {};

    const container = document.getElementById("today-schedule");

    if(saved[d]){
        const box = document.createElement("div");
        box.className = "schedule-box " + saved[d].status;
        box.innerText = `${d}일 - ${saved[d].title} (${saved[d].status})`;
        container.appendChild(box);
    } else {
        const box = document.createElement("div");
        box.className = "schedule-box 없음";
        box.innerText = "오늘의 일정 없음";
        container.appendChild(box);
    }
}

loadTodaySchedule();
</script>

</body>
</html>
