<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>홈</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:0; }

.container { width:700px; margin:50px auto; }

.top-bar {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
}

.schedule-box {
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    color:white;
}

.확정 { background:#4CAF50; }
.겹침 { background:#f44336; }
.미확정 { background:orange; }
.없음 { background:#ccc; color:black; }

.contact {
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
    <div>👤 {{ request.user.username }}</div>
    <div><a href="/logout/">로그아웃</a></div>
</div>

<div class="card">
    <h2>📅 오늘의 일정</h2>
    <div id="today"></div>

    <h3>📌 예정된 일정</h3>
    <div id="upcoming"></div>
</div>

<div class="contact">
    <p>Mail: <a href="mailto:dayjeong.app@gmail.com">dayjeong.app@gmail.com</a></p>
    <p>Instagram: <a href="https://www.instagram.com/dayjeong.app/" target="_blank">@dayjeong.app</a></p>
    <p>kakaoTalk: <a href="https://pf.kakao.com/_wktuX" target="_blank">데이정(DayJeong)</a></p>
</div>

</div>

<div class="bottom-nav">
    <a href="/">🏠 홈</a>
    <a href="/add/">📅 일정</a>
    <a href="/friends/">👥 친구</a>
    <a href="/settings/">⚙ 설정</a>
</div>

<script>
function load(){
    const today = new Date();
    const tBox = document.getElementById("today");
    const uBox = document.getElementById("upcoming");

    tBox.innerHTML = "";
    uBox.innerHTML = "";

    for(let i=0;i<=6;i++){
        const d = new Date();
        d.setDate(today.getDate()+i);

        const y = d.getFullYear();
        const m = d.getMonth();
        const day = d.getDate();

        const key = `cal-${y}-${m}`;
        const saved = JSON.parse(localStorage.getItem(key)) || {};
        const schedules = saved[day];

        if(i===0){
            render(tBox, schedules, true);
        } else {
            render(uBox, schedules, false, d);
        }
    }
}

function render(box, schedules, isToday, date=null){
    if(!schedules){
        if(isToday){
            const div = document.createElement("div");
            div.className="schedule-box 없음";
            div.innerText="오늘 일정 없음";
            box.appendChild(div);
        }
        return;
    }

    let status = schedules.length>1 ? "겹침" : schedules[0].status;

    const div = document.createElement("div");
    div.className="schedule-box "+status;

    let text = isToday ? "오늘 - " : `${date.getMonth()+1}/${date.getDate()} - `;

    schedules.forEach(s=> text+=s.title+" ");
    text+=`(${status})`;

    div.innerText=text;
    box.appendChild(div);
}

load();
</script>

</body>
</html>
