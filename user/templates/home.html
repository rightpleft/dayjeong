<!DOCTYPE html>
<html>
<head>
    <title>DayJeong</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif; background:#f2f3f7;">

    <!-- 상단바 -->
    <div style="
        background:white;
        padding:16px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        border-bottom:1px solid #eee;
    ">
        <div style="font-weight:600;">DayJeong</div>

        <a href="/logout/" style="text-decoration:none; color:#ff4d4f;">
            로그아웃
        </a>
    </div>

    <div style="padding:20px;">

        <!-- 프로필 -->
        <div style="
            background:white;
            padding:20px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.05);
            margin-bottom:20px;
        ">
            <h3 style="margin:0;">👋 {{ request.user.username }}</h3>
            <p style="color:gray; margin-top:5px;">환영합니다!</p>
            <p style="font-size:12px; color:gray;">
                가입일: {{ request.user.date_joined }}
            </p>
        </div>

        <!-- 일정 -->
        <div style="
            background:white;
            padding:20px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.05);
            margin-bottom:20px;
        ">
            <h3 style="margin-top:0;">📅 오늘 일정</h3>
            <p style="color:gray;">아직 일정이 없습니다</p>
        </div>

        <!-- 일정 추가 -->
        <a href="/add/">
            <button style="
                width:100%;
                padding:15px;
                border:none;
                border-radius:15px;
                background:#4a6cf7;
                color:white;
                font-size:16px;
            ">
                + 일정 추가
            </button>
        </a>

        <!-- 연락 (심플) -->
        <div style="text-align:center; margin-top:40px; color:gray; font-size:14px;">

            <p>
                Mail: 
                <a href="mailto:dayjeong.app@gmail.com" style="color:#4a6cf7; text-decoration:none;">
                    dayjeong.app@gmail.com
                </a>
            </p>

            <p>
                Instagram: 
                <a href="https://instagram.com/dayjeong.app" target="_blank" style="color:#4a6cf7; text-decoration:none;">
                    @dayjeong.app
                </a>
            </p>

            <p>
                kakaotalk: 
                <a href="https://pf.kakao.com/_wktuX" target="_blank" style="color:#4a6cf7; text-decoration:none;">
                    DayJeong
                </a>
            </p>

        </div>

    </div>

</body>
</html>
