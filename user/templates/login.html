<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 카드 */
.login-box {
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

/* 타이틀 */
h2 {
    margin-bottom:20px;
}

/* input */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

/* 버튼 */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#6c63ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#574fd6;
}

/* 하단 링크 */
.link {
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🔐 로그인</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="아이디" required>
        <input type="password" name="password" placeholder="비밀번호" required>
        <button type="submit">로그인</button>
    </form>

    <div class="link">
        계정이 없나요? <a href="/signup/">회원가입</a>
    </div>
</div>

</body>
</html>
