<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f0f0f0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 전체 */
.wrapper {
    text-align:center;
}

/* 로고 */
.logo {
    font-size:44px;
    font-weight:bold;
    color:#222;
    margin-bottom:10px;
    letter-spacing:2px;
}

/* 서브텍스트 */
.sub {
    font-size:12px;
    color:#777;
    margin-bottom:25px;
}

/* 카드 */
.login-box {
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* 제목 */
h2 {
    margin-bottom:20px;
    color:#333;
}

/* input */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    box-sizing:border-box; /* 🔥 핵심 (중앙 정렬 해결) */
}

/* 버튼 */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover {
    background:#111;
}

/* 링크 */
.link {
    margin-top:15px;
    font-size:13px;
    color:#555;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- 로고 -->
    <div class="logo">
        📅🌿 DayJeong
    </div>
    <div class="sub">
        우리의 일정, 우리의 데이정
    </div>

    <div class="login-box">
        <h2>로그인</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>

        <div class="link">
            계정이 없나요? <a href="/signup/">회원가입</a>
        </div>
    </div>

</div>

</body>
</html>
