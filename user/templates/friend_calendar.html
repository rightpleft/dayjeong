<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>친구 캘린더</title>

<style>
body { font-family: Arial; padding:20px; }

.calendar {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day {
    padding:10px;
    background:#eee;
    text-align:center;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔙 뒤로가기 -->
<a href="/friends/" style="display:inline-block; margin-bottom:10px;">
    ← 친구 목록으로
</a>

<h2>{{ friend.username }}의 캘린더</h2>

<div id="calendar" class="calendar"></div>

<script>
let now = new Date();
now.setDate(1);

function loadCal(){
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    const year = now.getFullYear();
    const month = now.getMonth();

    // 요일
    const days = ["일","월","화","수","목","금","토"];
    days.forEach(d=>{
        const div = document.createElement("div");
        div.innerText = d;
        div.style.fontWeight = "bold";
        cal.appendChild(div);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month+1, 0).getDate();

    // 빈칸
    for(let i=0; i<firstDay; i++){
        cal.appendChild(document.createElement("div"));
    }

    // 날짜
    for(let d=1; d<=lastDate; d++){
        const div = document.createElement("div");
        div.className = "day";
        div.innerText = d;

        div.onclick = () => sendRequest(`${year}-${month+1}-${d}`);

        cal.appendChild(div);
    }
}

function sendRequest(date){
    if(confirm(date + " 일정을 요청할까요?")){
        fetch("/send-schedule-request/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                date: date,
                to_user: "{{ friend.id }}"
            })
        }).then(()=>{
            alert("요청 전송 완료!");
        });
    }
}

loadCal();
</script>

</body>
</html>
